name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter "./packages/*" --filter @visionops/web lint
      - run: pnpm --filter "./packages/*" --filter @visionops/web typecheck
      - run: pnpm --filter @visionops/utils test
      - run: pnpm --filter @visionops/web build

  python:
    name: Backend (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, ai-engine, worker]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip && pip install ".[dev]"
      - run: ruff check .
      - run: pytest -q
