name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python dependency audit (non-blocking)
        run: |
          pip install pip-audit
          for app in api ai-engine worker; do
            echo "== apps/$app =="
            pip-audit -r <(cd apps/$app && pip install -q -e . 2>/dev/null; pip freeze) || true
          done
        continue-on-error: true

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter "./packages/*" --filter @visionops/web lint
      - run: pnpm --filter "./packages/*" --filter @visionops/web typecheck
      - run: pnpm --filter @visionops/utils test
      - run: pnpm --filter @visionops/web build

  api:
    name: API (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: visionops
          POSTGRES_PASSWORD: visionops
          POSTGRES_DB: visionops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U visionops"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://visionops:visionops@localhost:5432/visionops
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip && pip install ".[dev]"
      - run: ruff check app tests
      - run: alembic upgrade head
      - run: pytest -q

  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  services:
    name: AI/Worker (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ai-engine, worker]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip && pip install ".[dev]"
      - run: ruff check src tests
      - run: pytest -q
