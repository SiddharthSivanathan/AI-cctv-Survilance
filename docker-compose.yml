# VisionOps AI — local development stack.
# Usage: cp .env.example .env && docker compose up --build
name: visionops-ai

services:
  postgres:
    image: timescale/timescaledb:2.17.0-pg16
    container_name: visionops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-visionops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-visionops_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-visionops}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-visionops} -d ${POSTGRES_DB:-visionops}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: visionops-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: visionops-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-visionops}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-visionops_dev_password}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: visionops-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-visionops}:${POSTGRES_PASSWORD:-visionops_dev_password}@postgres:5432/${POSTGRES_DB:-visionops}
      REDIS_URL: redis://redis:6379/0
    # Apply DB migrations on startup so the stack is self-initializing
    # (no manual `alembic upgrade head` needed, even after `down -v`).
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: visionops-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - '3000:3000'
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    container_name: visionops-worker
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy

  ai-engine:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.ai-engine
    container_name: visionops-ai-engine
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      API_INTERNAL_URL: http://api:8000
      GATEWAY_INTERNAL_URL: http://gateway:8080
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
    depends_on:
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_started
      api:
        condition: service_started

  mediamtx:
    # Pinned: `latest` silently bumped to a version whose control API is
    # auth-restricted by default, breaking gateway provisioning.
    image: bluenviron/mediamtx:1.19.2
    container_name: visionops-mediamtx
    restart: unless-stopped
    volumes:
      - ./infrastructure/docker/mediamtx.yml:/mediamtx.yml:ro
    ports:
      # RTSP
      - "8554:8554"

      # WebRTC media (ICE)
      - "8189:8189/udp"

      # Optional: MediaMTX API
      - "9997:9997"

      # Optional: WebRTC signalling
      - "8889:8889"

  gateway:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.gateway
    container_name: visionops-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      GATEWAY_PORT: '8080'
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_WEBRTC_URL: http://mediamtx:8889
    ports:
      - '8080:8080'
    depends_on:
      - mediamtx

volumes:
  postgres_data:
  redis_data:
  minio_data:
