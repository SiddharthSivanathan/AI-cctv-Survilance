# MediaMTX configuration for VisionOps AI.
# WebRTC-only media plane. RTSP/RTMP/HLS/SRT servers are disabled — the gateway
# fronts WebRTC signaling; paths are provisioned at runtime via the control API.

logLevel: info

# Authentication. MediaMTX's default restricts the control API (and metrics)
# to 127.0.0.1, which blocks the gateway (a separate container) with a 401.
# All MediaMTX ports here are internal to the Docker network (only the WebRTC
# media UDP port and the gateway are exposed), so we allow the internal
# services full access. Override with real credentials before exposing any of
# these ports publicly.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

# Control API (used by the gateway to add on-demand source paths). Internal only.
api: yes
apiAddress: :9997

# WebRTC (WHEP). Signaling is proxied by the gateway; media (ICE) is direct.
webrtc: yes
webrtcAddress: :8889
# Media UDP port — must be reachable by the browser (exposed in docker-compose).
webrtcLocalUDPAddress: :8189
# Advertise a browser-reachable host in ICE candidates. For production set this
# to the public IP/hostname (and add a TURN server for restrictive networks).
webrtcAdditionalHosts: [localhost]

# Internal RTSP — used by the AI frame sampler to read provisioned camera
# paths (rtsp://mediamtx:8554/{camera_id}). Not exposed in docker-compose.
rtsp: yes
rtspAddress: :8554
rtmp: no
hls: no
srt: no

# Paths are added dynamically by the gateway via the control API.
paths:
  demo:
    source: publisher
